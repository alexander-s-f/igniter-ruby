AllCops:
  TargetRubyVersion: 3.1
  NewCops: disable
  SuggestExtensions: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

Lint/ScriptPermission:
  Exclude:
    - "examples/**/*.rb"

Lint/ConstantDefinitionInBlock:
  Exclude:
    - "spec/**/*"
    - "packages/**/spec/**/*"

Layout/LineLength:
  Enabled: false

Naming/FileName:
  Exclude:
    - "packages/*/lib/igniter-*.rb"
