[package]
name = "igniter_store_native"
version = "0.1.0"
edition = "2021"
authors = ["Alexander <alexander.s.fokin@gmail.com>"]

[lib]
name = "igniter_store_native"
crate-type = ["cdylib"]

[dependencies]
magnus = "0.7"
blake3 = "1.5"
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1.3"
crc32fast = "1"
uuid = { version = "1", features = ["v4", "fast-rng"] }

[profile.release]
lto = true
codegen-units = 1
opt-level = 3

[profile.dev]
opt-level = 0
debug = true
